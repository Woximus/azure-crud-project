version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://mojuzytkownik:mojehaslo@db:5432/mojabaza
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mojuzytkownik
      - POSTGRES_PASSWORD=mojehaslo
      - POSTGRES_DB=mojabaza
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojuzytkownik -d mojabaza"]
      interval: 5s
      timeout: 5s
      retries: 5