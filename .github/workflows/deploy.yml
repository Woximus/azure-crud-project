name: CI/CD Wdrozenie na Azure

on:
  push:
    branches: [ "main" ]

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Pobieranie najnowszego kodu
      uses: actions/checkout@v3

    - name: Instalacja Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Uruchomienie testow
      run: npm test

    - name: Wdrozenie aplikacji na serwer w Azure
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd ~
          echo "Wylaczam stare kontenery..."
          if [ -d "app" ]; then cd app && docker-compose down && cd ~; fi
          echo "Usuwam stare pliki (sudo)..."
          sudo rm -rf app
          echo "Pobieram publiczna aplikacje..."
          git clone https://github.com/Woximus/azure-crud-project.git app
          cd app
          echo "Restartuje serwer..."
          docker-compose up -d --build